  /* ── Controls ── */

    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    background: #FFB800;
    color: #111;
    border: none;
    padding: 10px 24px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: background 0.15s;

  .btn:hover { background: #e6a800; }
  .btn:disabled { background: #555; color: #888; cursor: default; }

  .page-counter {
    color: #ccc;
    font-size: 14px;
    min-width: 100px;
    text-align: center;
  }

  .btn-download {
    background: #8B2FC9;
    color: #fff;

  .btn-download:hover { background: #7a28b0; }

  /* ── Instructions ── */

    color: #666;
    font-size: 11px;
    margin-top: 12px;
    text-align: center;
  }

  /* ── Loading state ── */
  #loading {
    color: #FFB800;
    font-size: 16px;
    text-align: center;
    padding: 40px;

  }

<script>
  // ── Detect screen size for responsive book dimensions ──
  function getBookSize() {
    const vw = window.innerWidth;
    if (vw < 480) {
      return { width: vw - 40, height: Math.round((vw - 40) * 1.294) };
    } else if (vw < 800) {
      return { width: Math.min(350, vw / 2 - 20), height: Math.round(Math.min(350, vw / 2 - 20) * 1.294) };
    } else {
      return { width: 400, height: 518 };
    }
  }

  const size = getBookSize();

  // ── Initialise StPageFlip ──
  const pageFlip = new St.PageFlip(
    document.getElementById('flipbook'),
    {
      width: size.width,
      height: size.height,
      size: 'fixed',
      minWidth: 200,
      maxWidth: 500,
      minHeight: 260,
      maxHeight: 650,
      drawShadow: true,
      flippingTime: 700,
      usePortrait: true,
      startZIndex: 0,
      autoSize: true,
      showCover: true,       // first page renders as full cover
      mobileScrollSupport: true,
      swipeDistance: 30,
      showPageCount: true,
      useMouseEvents: true,
    }
  );

  // Load pages from HTML img elements
  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  // ── Update page counter ──
  function updateCounter() {
    const current = pageFlip.getCurrentPageIndex() + 1;
    const total = pageFlip.getPageCount();
    document.getElementById('page-counter').textContent = 'Page ' + current + ' of ' + total;
    document.getElementById('btn-prev').disabled = current <= 1;
    document.getElementById('btn-next').disabled = current >= total;
  }

  pageFlip.on('flip', updateCounter);
  pageFlip.on('init', updateCounter);

  // ── Button handlers ──
  function flipPrev() { pageFlip.flipPrev(); }
  function flipNext() { pageFlip.flipNext(); }

  // ── Keyboard navigation ──
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') flipNext();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   flipPrev();
  });
</script>
